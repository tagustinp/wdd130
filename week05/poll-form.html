<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poll Exercise</title>
    <link rel="stylesheet" href="styles/poll-form.css">
</head>

<main>
    <form action="">
        <div class="form-item column2">
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" name="fullname" required>
        </div>
        <div class="form-item column2">
            <label for="useremail">Email</label>
            <input type="email" id="useremail" name="useremail" required>
        </div>
        <div class="form-item column1">
            <label for="browser">What is your favorite browser?</label>
            <select name="browser" id="browser">
                <option value="1">Chrome</option>
                <option value="2">Firefox</option>
                <option value="3">Duck Duck Go</option>
            </select>
        </div>
        <div class="form-item column1">
            <label for="pet">Do you have a household pet?</label>
            <input type="checkbox" id="pet" name="pet">
        </div>
        <div class="form-item">
            <label for="feedback">List of the places you have lived</label>
            <textarea id="feedback" name="feedback" rows="4"
              placeholder="Buenos Aires Argentina, Sao Paulo Brazil, Lima Peru"></textarea>
        </div>
        <button type="submit">Submit Poll</button>
    </form>
</main>

</html>
